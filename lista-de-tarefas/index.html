<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=more_vert" />
</head>
<body>
    <div class="div-ins-text">

        <div class="container">

        <input type="text" name="input-ins-text" id="input-ins-text" class="input-ins-text" placeholder="Insira uma tarefa">
        <input type="button" value="Adicionar" id="btn-add-task">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=cancel" />

        </div>

    </div>
    <div class="div-list-task">
        <table>
            <thead>
            <th id="th-number">Nº</th>
            <th id="th-task">Tarefa</th>
            <th id="th-completed">Concluida?</th>
            <th id="th-options">Opções</th>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>a</td>
                    <td>
                        <input type="checkbox" name="check-completed" id="check-completed">
                    </td>
                    <td>
                        <input type="button" value="❌" id="btn-delete-task">
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
